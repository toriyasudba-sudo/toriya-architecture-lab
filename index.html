<p>Правила, которые держат декомпозицию в порядке:</p>
<ul>
<li><b>Каждая подфункция — глагол + объект.</b> То же правило, что и для контекстной функции. «Анализ» — не подфункция; «проанализировать процессы клиента» — подфункция.</li>
<li><b>Один уровень — один масштаб.</b> «Собрать контекст» и «нажать кнопку экспорта» не могут стоять рядом: первое — этап, второе — микродействие. Смешение масштабов — верный признак, что структура не продумана, а надёргана.</li>
<li><b>Подфункции вместе исчерпывают родителя.</b> Сумма детей = работа родителя. Если после перечисления детей у родителя осталась «невидимая» работа — её забыли; если ребёнок делает то, чего нет в родителе, — он из другой ветки.</li>
<li><b>Стрелки наследуются.</b> Всё, что входило в родителя, должно войти в кого-то из детей; всё, что выходило, — выйти из кого-то из них. Это называется балансировкой (подробно — в 4.4).</li>
</ul>
<p>Когда остановиться? Ответ даёт цель моделирования из 4.1. Если цель — «понять, что автоматизировать», копаем до уровня, где у каждой подфункции можно спросить «руками или машиной?». Дальше — уже не архитектура, а инструкция. Модель, декомпозированная «до упора», — частая болезнь перфекциониста: она стоит недель работы и не отвечает ни на один вопрос лучше, чем модель на два уровня мельче.</p>`,
  see:`<p>Кейс студии. «Провести архитектурную диагностику проекта» разложена на пять: собрать контекст бизнеса → выявить симптомы и потери → определить возможные причины → сформировать архитектурный диагноз → предложить маршрут решения. Один масштаб, глаголы, вместе — ровно работа родителя. «Отправить клиенту ссылку на анкету» сюда не попала: это уровень глубже, внутри «собрать контекст».</p>`,
  differ:{ type:'multi', q:'Функция: «Обеспечить клиента продуктом после оплаты». Отметь подходящие подфункции ЕЁ уровня:',

LESSONS['l4-4'] = {

  why:'Какую проблему решают эти две дисциплины? Они гарантируют, что уровни модели рассказывают одну историю, а слова в ней значат одно и то же.',
  understand:`
<p><b>Балансировка стрелок.</b> Когда функция раскрыта декомпозицией, диаграмма-ребёнок обязана «сойтись» с родителем: каждая стрелка, касавшаяся родительского прямоугольника, должна появиться на детской диаграмме и подключиться к конкретным подфункциям. Вход родителя входит в кого-то из детей, выход родителя выходит из кого-то из них, управление и механизмы распределяются по тем, кто ими реально пользуется.</p>
<p>Небаланс — это не оформительская ошибка, а смысловая дыра. Стрелка есть у родителя, но не находит места у детей? Значит, никто не знает, какая именно часть работы её использует, — и при реализации она потеряется. Стрелка появилась у детей из ниоткуда? Значит, у системы есть незадекларированная зависимость, которая однажды выстрелит: «а откуда мы вообще берём эти данные?»</p>

<p><b>Глоссарий.</b> Каждая стрелка и функция получают определение: «заявка — обращение клиента с контактами и описанием запроса, поступившее в любой канал». Звучит бюрократично, работает спасительно: в живых проектах «заявкой» одновременно называют сообщение в директе, заполненную анкету и созданную сделку — а потом искренне удивляются, почему «заявок 40, а клиентов 4». Глоссарий — это единый язык модели: слово = одно значение. На уровне 5 из него вырастут сущности и данные, поэтому неряшливость здесь стоит дорого дважды.</p>`,
  see:`<p>Кейс студии. У родителя «Провести диагностику» вход — «запрос и данные клиента». В декомпозиции он входит в «собрать контекст». Выход родителя «диагноз и маршрут» выходит из «предложить маршрут». Методология (управление) подключена к трём из пяти подфункций — и это честно: сбор контекста идёт по методологии, а выставление счёта — нет. Глоссарий зафиксировал: «диагноз» — документ с формулировкой реальной задачи, узкими местами и типом решения. Не созвон, не ощущение — документ.</p>`,

LESSONS['l4-5'] = {
  lv:4, n:'4.5', t:'Типичные ошибки модели', comps:['func','sys'],
  why:'Какую проблему решает разбор ошибок? Ошибки IDEF0 однотипны — научившись видеть шесть классических, ты проверяешь любую модель за десять минут.',
  understand:`
<p>Шесть болезней, которые встречаются в девяти моделях из десяти (список почти дословно совпадает с требованиями университетских методичек — потому что за ним десятилетия чужих граблей):</p>
<ul>
<li><b>Результат во входе.</b> «Готовый отчёт» нарисован слева. Проверка: вход перерабатывается функцией. Если элемент — то, ради чего функция существует, его место справа.</li>
<li><b>Исполнитель в управлении.</b> «Архитектор» сверху. Но человек не правило: он выполняет работу, а не регламентирует её. Люди, роли и сервисы — снизу, в механизмах.</li>
<li><b>Правило в механизме.</b> «Методология» снизу. Обратная ошибка: методология не выполняет работу — она определяет, как её выполнять. Правила, стандарты, требования — сверху.</li>
<li><b>Функция-существительное.</b> «Диагностика», «Продажи». Вещь вместо работы. Лечится глаголом: «провести диагностику», «продать услугу» — и сразу видно, есть ли у работы результат.</li>
<li><b>Нет цели и точки зрения.</b> Модель «вообще». Читатель не знает, что важно, автор — когда остановиться. Первое требование к контекстной диаграмме — и первое, что забывают.</li>
<li><b>Функция не того масштаба.</b> Слишком широкая («управлять бизнесом») — граница системы не выбрана; слишком узкая («отправить письмо») — смоделирована щепка вместо системы.</li>
</ul>
<p>Порядок проверки чужой (и своей) модели: сначала цель и точка зрения — без них дальше смотреть нечего; затем имена функций — глаголы ли; затем стороны — по вопросам из 4.2; затем баланс уровней — по 4.4. Именно в этой последовательности: нет смысла проверять стрелки в модели, у которой не выбрана цель.</p>
<p>И финальное правило уровня: модель — не самоцель. Она закончена не тогда, когда красива, а тогда, когда отвечает на вопрос из своей цели. Ответила — остановись.</p>`,
  see:`<p>Кейс студии: на проверку принесли модель «Диагностика» (существительное), где слева — «отчёт для клиента» (результат во входе), сверху — «Тория» (исполнитель в управлении), снизу — «методология» (правило в механизме), а цель моделирования отсутствует. Четыре болезни на одной диаграмме — обычное дело для первой модели. После лечения: «Провести диагностику», отчёт — справа, Тория — снизу, методология — сверху, цель — «понять, что автоматизировать».</p>`,

        {t:'Запустить рекламу на несуществующий продукт', ok:false, why:'Лендинг-тест возможен, но платящий ручной сервис даст на порядок более честные данные.'}]}

  { id:'c17', t:'Автоматизировали очередь в никуда', sub:'Проверь, что автоматизация ведёт к результату, а не к красивому тупику',

// Одиночный / множественный выбор. cb(ok)
function renderChoice(container, spec, cb) {
  const multi = !!spec.multi || spec.type === 'multi';
  const wrap = el(`<div><p class="small" style="font-weight:600">${spec.q}</p><div class="opts"></div>
    <button class="btn block mt8" disabled>Проверить</button><div class="res"></div></div>`);
  const optsBox = wrap.querySelector('.opts');
  const btn = wrap.querySelector('button');
  const sel = new Set();
  spec.opts.forEach((o, i) => {
    const b = el(`<button class="opt" type="button"><span class="box"></span><span>${o.t}</span></button>`);
    b.onclick = () => {
      if (btn.dataset.done) return;
      if (multi) { sel.has(i) ? sel.delete(i) : sel.add(i); b.classList.toggle('sel'); }
      else { sel.clear(); sel.add(i); optsBox.querySelectorAll('.opt').forEach(x => x.classList.remove('sel')); b.classList.add('sel'); }
      btn.disabled = sel.size === 0;
    };
    optsBox.appendChild(b);
  });
  btn.onclick = () => {
    btn.dataset.done = 1; btn.classList.add('hidden');
    let allOk = true;
    optsBox.querySelectorAll('.opt').forEach((b, i) => {
      const o = spec.opts[i], picked = sel.has(i);
      if (o.ok) b.classList.add(picked ? 'good' : 'bad');
      else if (picked) b.classList.add('bad');
      if (o.ok !== picked) allOk = false;
      if (o.why && (o.ok || picked)) b.insertAdjacentHTML('beforeend', `<span class="expl" style="flex-basis:100%">${o.why}</span>`);
    });
    wrap.querySelector('.res').innerHTML = allOk
      ? `<div class="fb ok">Точно. Все различения на месте.</div>`
      : `<div class="fb warn">Посмотри объяснения: важно не «угадать», а увидеть признак, по которому различается.</div>`;
    cb(allOk);
  };
  container.appendChild(wrap);
}

// Распределение по категориям: тап по карточке → тап по категории
function renderCat(container, spec, cb) {
  const wrap = el(`<div><p class="small" style="font-weight:600">${spec.q}</p>
    <div class="tech mt8">Нажми карточку, затем категорию</div>
    <div class="pool mt8"></div><div class="cats mt8"></div>
    <button class="btn block mt8" disabled>Проверить</button><div class="res"></div></div>`);
  const pool = wrap.querySelector('.pool'), cats = wrap.querySelector('.cats'), btn = wrap.querySelector('button');
  const assign = {}; let picked = null;
  spec.items.forEach((it, i) => {
    const c = el(`<button class="chip" type="button">${it.t}</button>`);
    c.onclick = () => {
      if (btn.dataset.done) return;
      pool.querySelectorAll('.chip').forEach(x => x.classList.remove('sel'));
      picked = i; c.classList.add('sel');
    };
    c.dataset.i = i; pool.appendChild(c);
  });
  spec.cats.forEach((cname, ci) => {
    const box = el(`<div class="card" style="padding:10px;margin:8px 0"><div class="tech">${cname}</div><div class="slot"></div></div>`);
    box.onclick = () => {
      if (btn.dataset.done || picked === null) return;
      assign[picked] = ci;
      const chip = pool.querySelector(`.chip[data-i="${picked}"]`);
      chip.classList.remove('sel');
      box.querySelector('.slot').appendChild(chip);
      picked = null;
      btn.disabled = Object.keys(assign).length < spec.items.length;
    };
    cats.appendChild(box);
  });
  btn.onclick = () => {
    btn.dataset.done = 1; btn.classList.add('hidden');
    let ok = 0;
    spec.items.forEach((it, i) => {
      const chip = wrap.querySelector(`.chip[data-i="${i}"]`);
      const right = assign[i] === it.cat;
      chip.classList.add(right ? 'ok' : 'err');
      if (right) ok++;
      chip.insertAdjacentHTML('afterend', `<div class="expl">${right ? '' : '<b>' + spec.cats[it.cat] + '.</b> '}${it.why}</div>`);
    });
    const allOk = ok === spec.items.length;
    wrap.querySelector('.res').innerHTML = allOk
      ? `<div class="fb ok">Все ${ok} на своих местах.</div>`
      : `<div class="fb warn">${ok} из ${spec.items.length}. Разбери объяснения к промахам — там признаки категорий.</div>`;
    cb(allOk);
  };
  container.appendChild(wrap);
}

// Сортировка порядка (кнопки вверх/вниз)
function renderSort(container, spec, cb) {
  const wrap = el(`<div><p class="small" style="font-weight:600">${spec.q}</p><div class="sortlist"></div>
    <button class="btn block mt8">Проверить порядок</button><div class="res"></div></div>`);
  const list = wrap.querySelector('.sortlist'), btn = wrap.querySelector('button');
  // перемешиваем детерминированно-неправильно
  let order = spec.items.map((_, i) => i);
  for (let i = order.length - 1; i > 0; i--) { const j = (i * 7 + 3) % (i + 1); [order[i], order[j]] = [order[j], order[i]]; }
  if (order.every((v, i) => v === i)) order.reverse();
  function draw() {
    list.innerHTML = '';
    order.forEach((idx, pos) => {
      const it = el(`<div class="sortitem"><span class="num">${String(pos + 1).padStart(2, '0')}</span><span>${spec.items[idx]}</span>
        <span class="mv"><button type="button" aria-label="Выше">↑</button><button type="button" aria-label="Ниже">↓</button></span></div>`);
      const [up, dn] = it.querySelectorAll('.mv button');
      up.onclick = () => { if (pos > 0) { [order[pos - 1], order[pos]] = [order[pos], order[pos - 1]]; draw(); } };
      dn.onclick = () => { if (pos < order.length - 1) { [order[pos + 1], order[pos]] = [order[pos], order[pos + 1]]; draw(); } };
      list.appendChild(it);
    });
  }
  draw();
  btn.onclick = () => {
    const ok = order.every((v, i) => v === i);
    if (ok) {
      btn.classList.add('hidden');
      list.querySelectorAll('.sortitem').forEach(x => x.style.borderColor = 'var(--ok)');
      wrap.querySelector('.res').innerHTML = `<div class="fb ok">${spec.why}</div>`;
      cb(true);
    } else {
      wrap.querySelector('.res').innerHTML = `<div class="fb warn">Порядок пока не сошёлся. Подсказка: двигайся от первого контакта человека к его результату.</div>`;
    }
  };
  container.appendChild(wrap);
}

function renderDiffer(container, spec, cb) {
  if (!spec) { cb(true); return; }
  if (spec.type === 'single' || spec.type === 'multi') renderChoice(container, spec, cb);
  else if (spec.type === 'cat') renderCat(container, spec, cb);
  else if (spec.type === 'sort') renderSort(container, spec, cb);
  else cb(true);
}

/* ============================================================
   9. VALIDATION — проверка открытых ответов
   ============================================================ */
const GENERIC_BAD = [/^все\b/i, /^всё\b/i, /улучшить вс/i, /сделать лучше/i, /как-нибудь/i, /по-разному/i];
const VERB_RE = /(?:^|\s)\S+(?:ть|ти|чь)(?=[\s,.;:]|$)/;

function validateField(f, val) {
  const v = (val || '').trim();
  const out = { ok: true, noticed: [], missed: [] };
  if (!v || v.length < (f.min || 10)) {
    out.ok = false;
    out.missed.push(`«${f.label}»: ответ слишком короткий, чтобы с ним можно было работать. Разверни до конкретики.`);
    return out;
  }
  out.noticed.push(`«${f.label}»: заполнено содержательно.`);
  if (f.needAny && !f.needAny.some(k => v.toLowerCase().includes(k.toLowerCase()))) {
    out.ok = false;
    out.missed.push(`«${f.label}»: не видно ожидаемой структуры (${f.needAny.slice(0, 3).join(' / ')}…). Проверь, есть ли она по смыслу.`);
  }
  if (f.needVerbs && !VERB_RE.test(v)) {
    out.ok = false;
    out.missed.push(`«${f.label}»: формулировки должны начинаться с глагола («собрать…», «провести…»).`);
  }
  if (f.warnAny) {
    const hit = f.warnAny.find(k => v.toLowerCase().includes(k.toLowerCase()));
    if (hit) out.missed.push(`«${f.label}»: встречается «${hit.trim()}» — проверь, не смешиваешь ли факты с желаемым или оценками.`);
  }
  if (f.warnGeneric && GENERIC_BAD.some(re => re.test(v))) {
    out.missed.push(`«${f.label}»: формулировка звучит слишком общо. Замени на наблюдаемый факт.`);
  }
  return out;
}

function validateAnswers(fields, answers) {
  const res = { okCount: 0, total: fields.length, noticed: [], missed: [] };
  fields.forEach(f => {
    const r = validateField(f, answers[f.k]);
    if (r.ok) res.okCount++;
    res.noticed.push(...r.noticed);
    res.missed.push(...r.missed);
  });
  return res;
}

const STEP_NAMES = ['Зачем', 'Понять', 'Увидеть', 'Различить', 'Сделать', 'Проверить', 'Сохранить'];

function lessonState(id) {
  if (!S.lessons[id]) S.lessons[id] = { done: false, step: 0, answers: {}, differOk: false };
  return S.lessons[id];
}

function openLesson(id) {
  const L = LESSONS[id];
  if (!L) return;
  S.lastLesson = id; saveState(); touchStreak();
  const st = lessonState(id);
  renderLessonStep(id, Math.min(st.step, 6));
}

function stepsBar(cur) {
  return `<div class="steps" aria-label="Шаг ${cur + 1} из 7">${STEP_NAMES.map((_, i) =>
    `<i class="${i <= cur ? 'on' : ''}"></i>`).join('')}</div>`;
}

function lessonHeader(L, cur) {
  return `<button class="backbtn" onclick="openLevel(${L.lv})">← Уровень ${L.lv}</button>
    <div class="eyebrow">Урок ${L.n} · шаг ${cur + 1}/7 · ${STEP_NAMES[cur]}</div>
    <h2>${L.t}</h2>${stepsBar(cur)}`;
}

function renderLessonStep(id, stepIdx) {
  const L = LESSONS[id];
  const st = lessonState(id);
  st.step = Math.max(st.step, stepIdx); saveState();
  let body = '';
  const nextBtn = (label) => `<button class="btn block mt16" id="lnext">${label || 'Дальше'}</button>`;

  if (stepIdx === 0) {
    body = `<div class="card frame"><div class="modnum">${L.n}</div>
      <div class="eyebrow">Какую проблему решает этот инструмент?</div>
      <p class="lessontxt">${L.why}</p></div>${nextBtn('Понять')}`;
  } else if (stepIdx === 1) {
    body = `<div class="card"><div class="lessontxt">${L.understand}</div>
      <hr class="divider"><div class="tech">Источник: ${L.source}</div></div>${nextBtn('Увидеть на кейсе')}`;
  } else if (stepIdx === 2) {
    body = `<div class="card"><div class="eyebrow">Сквозной кейс · сервис архитектурной диагностики</div>
      <div class="lessontxt">${L.see}</div></div>${nextBtn(L.differ ? 'Различить' : 'К практике')}`;
  } else if (stepIdx === 3) {
    body = `<div class="card" id="differbox"></div><div id="afterdiffer"></div>`;
  } else if (stepIdx === 4) {
    if (L.trainer) {
      body = `<div id="trainerbox"></div>`;
    } else if (L.make) {
      body = `<div class="card"><p class="small" style="font-weight:600">${L.make.intro}</p>
        <div class="callout small">Автоматическая проверка оценивает структуру ответа. Архитектурное качество дополнительно проверяется через вопросы самодиагностики на следующем шаге.</div>
        ${L.make.fields.map(f => `<div class="field"><label for="mf-${f.k}">${f.label}</label>
          <textarea id="mf-${f.k}" placeholder="${esc(f.ph || '')}">${esc(st.answers[f.k] || '')}</textarea>
          ${f.hint ? `<div class="hint">${f.hint}</div>` : ''}</div>`).join('')}
        <button class="btn block" id="lcheck">Проверить</button></div>`;
    } else { renderLessonStep(id, 5); return; }
  } else if (stepIdx === 5) {
    const v = L.make ? validateAnswers(L.make.fields, st.answers) : null;
    body = `<div class="card">
      ${v ? `<div class="fb ${v.missed.length === 0 ? 'ok' : (v.okCount > 0 ? 'warn' : 'err')}">
        <b>Структурная проверка: ${v.okCount}/${v.total}</b>
        ${v.noticed.length ? `<div class="mt8 small"><b>Что замечено верно:</b><ul>${v.noticed.map(x => `<li>${x}</li>`).join('')}</ul></div>` : ''}
        ${v.missed.length ? `<div class="mt8 small"><b>Что стоит доработать и почему это важно:</b><ul>${v.missed.map(x => `<li>${x}</li>`).join('')}</ul></div>` : ''}
      </div>` : ''}
      <div class="eyebrow mt8">Самодиагностика</div>
      ${L.checklist.map((c, i) => `<label class="check"><input type="checkbox" data-chk="${i}"><span>${c}</span></label>`).join('')}
      ${L.example ? `<hr class="divider"><div class="eyebrow">Сравни с примером</div><div class="lessontxt small">${L.example}</div>` : ''}
      ${v && v.missed.length ? `<button class="btn ghost block mt8" id="lback">Вернуться и доработать</button>` : ''}
      <button class="btn block mt8" id="lnext">${L.make ? 'Сохранить артефакт' : 'Завершить урок'}</button></div>`;
  } else {
    body = `<div class="card frame center">
      ${imgTag('assets/core/level-complete-system.webp', 'Завершённый архитектурный модуль, соединённый со следующим уровнем')}
      <h3 class="mt8">Урок пройден</h3>
      <p class="small dim mt8">${L.make || L.trainer ? 'Артефакт сохранён в архитектурный паспорт проекта.' : 'Материал закреплён.'}</p>
      <div class="btnrow"><button class="btn subtle grow" onclick="openLevel(${L.lv})">К уровню</button>
      <button class="btn grow" id="lnextlesson">Дальше</button></div></div>`;
  }

  showDetail(`<div>${lessonHeader(L, stepIdx)}${body}</div>`, 'route');

  if (stepIdx === 3) {
    const box = $('#differbox');
    renderDiffer(box, L.differ, ok => {
      st.differOk = ok; saveState();
      $('#afterdiffer').innerHTML = `<button class="btn block" id="lnext">${L.trainer ? 'К тренажёру' : 'К практике'}</button>`;
      $('#lnext').onclick = () => renderLessonStep(id, 4);
    });
    if (!L.differ) renderLessonStep(id, 4);
  }
  if (stepIdx === 4) {
    if (L.trainer) startTrainer(L.trainer, id);
    else if (L.make) $('#lcheck').onclick = () => {
      L.make.fields.forEach(f => st.answers[f.k] = $('#mf-' + f.k).value);
      saveState();
      renderLessonStep(id, 5);
    };
  }
  if (stepIdx === 5) {
    if ($('#lback')) $('#lback').onclick = () => renderLessonStep(id, 4);
    $('#lnext').onclick = () => finishLesson(id);
  }
  if (stepIdx < 3 && $('#lnext')) $('#lnext').onclick = () => renderLessonStep(id, stepIdx + 1);
  if (stepIdx === 6 && $('#lnextlesson')) $('#lnextlesson').onclick = () => {
    const nxt = nextLessonAfter(id);
    nxt ? openLesson(nxt) : openLevel(L.lv);
  };
}

function nextLessonAfter(id) {
  const L = LESSONS[id];
  const lv = LEVELS.find(l => l.n === L.lv);
  const i = lv.lessons.indexOf(id);
  return lv.lessons[i + 1] || null;
}

function finishLesson(id) {
  const L = LESSONS[id];
  const st = lessonState(id);
  const first = !st.done;
  st.done = true;
  // артефакт из полей
  if (L.make && L.make.artifact) {
    saveArtifact({
      type: L.make.artifact.type, t: L.make.artifact.t, passKey: L.make.artifact.passKey,
      data: L.make.fields.map(f => ({ label: f.label, val: st.answers[f.k] || '' }))
    });
    if (L.make.artifact.passKey === 'boundaries') grantAch('bound');
  }
  if (first) L.comps.forEach(c => addComp(c, 12));
  saveState();
  renderLessonStep(id, 6);
}

function saveArtifact(a) {
  S.artifacts.push({
    id: uid(), ts: Date.now(),
    projectId: S.activeProject || 'case',
    type: a.type, t: a.t, passKey: a.passKey || null, data: a.data
  });
  saveState();
  toast('Артефакт сохранён: ' + a.t);
}

function startTrainer(name, lessonId) {
  const box = $('#trainerbox');
  if (name === 'idef0') trainerIdef0(box, lessonId);
  else if (name === 'idef0decomp') trainerDecomp(box, lessonId);
  else if (name === 'bpmn') trainerBpmn(box, lessonId);
  else if (name === 'bmc') trainerBmc(box, lessonId);
  else if (name === 'jtbd') trainerJtbd(box, lessonId);
  else if (name === 'momtest') trainerMomtest(box, lessonId);
}

function idef0Svg(placed) {
  // placed: {sideIdx:[labels]}
  const zone = (x, y, w, h, s) => `<rect class="dropzone ${placed._hot === s ? 'hot' : ''}" x="${x}" y="${y}" width="${w}" height="${h}" rx="8" data-zone="${s}"></rect>`;
  const labels = s => (placed[s] || []).map((t, i) => {
    const lim = (s === 0 || s === 2) ? 19 : 24;
    const short = t.length > lim ? t.slice(0, lim - 1) + '…' : t;
    let x, y, anchor = 'middle';
    if (s === 0) { x = 8; y = 78 + i * 16; anchor = 'start'; }
    if (s === 1) { x = 180; y = 16 + i * 15; }
    if (s === 2) { x = 352; y = 78 + i * 16; anchor = 'end'; }
    if (s === 3) { x = 180; y = 218 + i * 15; }
    return `<text class="svg-t" x="${x}" y="${y}" text-anchor="${anchor}">${esc(short)}</text>`;
  }).join('');
  return `<svg viewBox="0 0 360 240" role="img" aria-label="Диаграмма IDEF0">
    <defs><marker id="arrh" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 z" fill="#1E3A55"/></marker></defs>
    ${zone(2, 62, 106, 80, 0)}${zone(120, 2, 120, 44, 1)}${zone(252, 62, 106, 80, 2)}${zone(120, 194, 120, 44, 3)}
    <line class="svg-arrow" x1="108" y1="118" x2="128" y2="118"></line>
    <line class="svg-arrow" x1="180" y1="46" x2="180" y2="86"></line>
    <line class="svg-arrow" x1="232" y1="118" x2="252" y2="118"></line>
    <line class="svg-arrow" x1="180" y1="194" x2="180" y2="152"></line>
    <rect class="svg-func" x="128" y="86" width="104" height="66" rx="4"></rect>
    <text class="svg-T" x="180" y="112" text-anchor="middle">Провести</text>
    <text class="svg-T" x="180" y="126" text-anchor="middle">диагностику</text>
    <text class="tag-io svg-t" x="6" y="58" fill="#A9834C">ВХОД</text>
    <text class="tag-io svg-t" x="146" y="14" fill="#A9834C">УПРАВЛЕНИЕ</text>
    <text class="tag-io svg-t" x="354" y="58" text-anchor="end" fill="#A9834C">ВЫХОД</text>
    <text class="tag-io svg-t" x="150" y="236" fill="#A9834C">МЕХАНИЗМ</text>
    ${[0,1,2,3].map(labels).join('')}
  </svg>`;
}

function trainerIdef0(box, lessonId) {
  const C = IDEF0_CASE;
  const placed = { 0: [], 1: [], 2: [], 3: [] };
  const assign = {};
  let picked = null, done = false;
  box.innerHTML = `<div class="card">
    <div class="eyebrow">IDEF0-тренажёр</div>
    <h3>${C.func}</h3>
    <p class="small dim mt8">Нажми карточку, затем выбери сторону. Каждый элемент получит объяснение после проверки.</p>
    <div class="svgbox" id="idefsvg"></div>
    <div class="sidebtns" id="sidebtns"></div>
    <div class="pool" id="idefpool"></div>
    <button class="btn block mt8" id="idefcheck" disabled>Проверить размещение</button>
    <div id="idefres"></div></div>`;
  const svgbox = $('#idefsvg'), pool = $('#idefpool'), sb = $('#sidebtns'), btn = $('#idefcheck');
  function redraw() { svgbox.innerHTML = idef0Svg(placed); }
  function redrawSides() {
    sb.innerHTML = picked === null ? '' :
      C.sides.map((s, i) => `<button class="btn subtle small" data-s="${i}">${['←','↑','→','↓'][i]} ${s}</button>`).join('');
    sb.querySelectorAll('button').forEach(b => b.onclick = () => place(+b.dataset.s));
  }
  function place(side) {
    if (picked === null || done) return;
    // убрать из прежней стороны
    if (assign[picked] !== undefined) {
      const old = placed[assign[picked]];
      old.splice(old.indexOf(C.items[picked].t), 1);
    }
    assign[picked] = side;
    placed[side].push(C.items[picked].t);
    pool.querySelector(`.chip[data-i="${picked}"]`).classList.add('sel');
    picked = null; redraw(); redrawSides();
    btn.disabled = Object.keys(assign).length < C.items.length;
  }
  C.items.forEach((it, i) => {
    const c = el(`<button class="chip" type="button" data-i="${i}">${it.t}</button>`);
    c.onclick = () => {
      if (done) return;
      picked = i;
      pool.querySelectorAll('.chip').forEach(x => x.style.outline = '');
      c.style.outline = '2px solid var(--bronze)';
      redrawSides();
    };
    pool.appendChild(c);
  });
  redraw();
  btn.onclick = () => {
    done = true; btn.classList.add('hidden'); sb.innerHTML = '';
    let ok = 0;
    const rows = C.items.map((it, i) => {
      const right = assign[i] === it.s;
      if (right) ok++;
      const chip = pool.querySelector(`.chip[data-i="${i}"]`);
      chip.classList.remove('sel'); chip.classList.add(right ? 'ok' : 'err');
      return `<div class="check"><span>${right ? '✓' : '✗'} <b>${it.t}</b> — ${C.sides[it.s]}. <span class="dim">${it.why}</span></span></div>`;
    }).join('');
    const allOk = ok === C.items.length;
    if (allOk) grantAch('ctx');
    $('#idefres').innerHTML = `<div class="fb ${allOk ? 'ok' : 'warn'}"><b>${ok} из ${C.items.length} на своих сторонах.</b>
      ${allOk ? ' Контекстная диаграмма собрана корректно.' : ' Разбери объяснения — в них вопросы-различители сторон.'}</div>
      <div class="card" style="margin:10px 0;padding:10px">${rows}</div>
      <div class="eyebrow mt8">Типичные ошибки</div><div id="ideferr"></div>`;
    let ei = 0;
    const errBox = $('#ideferr');
    function nextErr() {
      if (ei >= C.errors.length) {
        errBox.insertAdjacentHTML('beforeend', `<button class="btn block mt8" id="ideffin">Сохранить артефакт и продолжить</button>`);
        $('#ideffin').onclick = () => {
          saveArtifact({ type: 'idef0', t: 'Контекстная диаграмма IDEF0 (кейс)', passKey: 'idef0',
            data: C.items.map(it => ({ label: C.sides[it.s], val: it.t })) });
          addComp('func', 8);
          renderLessonStep(lessonId, 5);
        };
        return;
      }
      const d = document.createElement('div');
      errBox.appendChild(d);
      renderChoice(d, C.errors[ei], () => { ei++; setTimeout(nextErr, 250); });
    }
    nextErr();
  };
}

/* Декомпозиция */
function trainerDecomp(box, lessonId) {
  const D = IDEF0_CASE.decomp;
  const sel = new Set();
  box.innerHTML = `<div class="card">
    <div class="eyebrow">Тренажёр декомпозиции</div>
    <h3>${D.parent}</h3>
    <p class="small dim mt8">Выбери 3–6 подфункций правильного уровня. Помни: имя функции начинается с глагола.</p>
    <div class="pool" id="dpool"></div>
    <div class="field mt8"><label>Добавь одну собственную подфункцию этого же уровня</label>
      <input type="text" id="downsub" placeholder="Например: Согласовать маршрут с клиентом"></div>
    <button class="btn block" id="dcheck">Проверить декомпозицию</button><div id="dres"></div></div>`;
  const pool = $('#dpool');
  D.pool.forEach((p, i) => {
    const c = el(`<button class="chip" type="button">${p.t}</button>`);
    c.onclick = () => { sel.has(i) ? sel.delete(i) : sel.add(i); c.classList.toggle('sel'); };
    c.dataset.i = i; pool.appendChild(c);
  });
  $('#dcheck').onclick = () => {
    const own = $('#downsub').value.trim();
    const msgs = [];
    let ok = true;
    D.pool.forEach((p, i) => {
      const c = pool.querySelector(`.chip[data-i="${i}"]`);
      c.classList.remove('ok', 'err');
      if (p.ok && !sel.has(i)) { ok = false; msgs.push(`Пропущена «${p.t}» — без неё работа родителя не исчерпана.`); }
      if (!p.ok && sel.has(i)) { ok = false; c.classList.add('err'); msgs.push(`«${p.t}» — лишняя: ${p.why}`); }
      if (p.ok && sel.has(i)) c.classList.add('ok');
    });
    const cnt = sel.size + (own ? 1 : 0);
    if (cnt < D.min || cnt > D.max) { ok = false; msgs.push(`Подфункций должно быть от ${D.min} до ${D.max}. Сейчас: ${cnt}.`); }
    if (own && !VERB_RE.test(own.split(/\s+/)[0] + ' ')) {
      ok = false; msgs.push(`Своя подфункция «${esc(own)}» не начинается с глагола. Правило: глагол + объект.`);
    }
    $('#dres').innerHTML = ok
      ? `<div class="fb ok"><b>Декомпозиция собрана.</b> ${D.why}</div>
         <button class="btn block mt8" id="dfin">Сохранить артефакт и продолжить</button>`
      : `<div class="fb warn"><b>Пока не сходится:</b><ul>${msgs.map(m => `<li>${m}</li>`).join('')}</ul></div>`;
    if (ok) {
      grantAch('decomp');
      $('#dfin').onclick = () => {
        saveArtifact({ type: 'idef0', t: 'Декомпозиция функции (кейс)', passKey: 'idef0',
          data: [...[...sel].map(i => ({ label: 'Подфункция', val: D.pool[i].t })),
            ...(own ? [{ label: 'Своя подфункция', val: own }] : [])] });
        addComp('func', 8);
        renderLessonStep(lessonId, 5);
      };
    }
  };
}

function bpmnSvg(laneNames, taskLanes) {
  const H = 54, W = 360;
  const lanes = laneNames.map((n, i) =>
    `<rect x="0" y="${i * H}" width="${W}" height="${H}" fill="${i % 2 ? 'rgba(198,208,219,.12)' : 'transparent'}" stroke="#C6D0DB"/>
     <text class="svg-t" x="6" y="${i * H + 14}" fill="#6B7A88">${esc(n)}</text>`).join('');
  let x = 30;
  const shapes = [];
  shapes.push(`<circle cx="${x}" cy="${taskLanes[0].lane * H + 34}" r="9" fill="none" stroke="#152A3F" stroke-width="1.6"/>`);
  let prev = { x: x - 15, y: taskLanes[0].lane * H + 34 };
  x += 26;
  taskLanes.forEach(t => {
    const y = t.lane * H + 20;
    shapes.push(`<line class="svg-arrow" x1="${prev.x + 24}" y1="${prev.y}" x2="${x}" y2="${y + 14}"></line>`);
    shapes.push(`<rect x="${x}" y="${y}" width="48" height="28" rx="5" fill="#FBF8F1" stroke="#1E3A55" stroke-width="1.4"/>
      <text class="svg-t" x="${x + 24}" y="${y + 17}" text-anchor="middle" font-size="7">${esc(t.short)}</text>`);
    prev = { x: x + 24, y: y + 14 };
    x += 62;
  });
  shapes.push(`<line class="svg-arrow" x1="${prev.x + 24}" y1="${prev.y}" x2="${x}" y2="${prev.y}"></line>`);
  shapes.push(`<circle cx="${x + 9}" cy="${prev.y}" r="9" fill="none" stroke="#152A3F" stroke-width="3"/>`);
  return `<svg viewBox="0 0 ${W} ${laneNames.length * H}" role="img" aria-label="Схема процесса BPMN">${lanes}${shapes.join('')}</svg>`;
}

function trainerBpmn(box, lessonId) {
  const B = BPMN_CASE;
  const stages = [];
  let stage = 0;
  box.innerHTML = `<div class="card"><div class="eyebrow">BPMN-тренажёр</div>
    <h3>${B.title}</h3><div id="bpmnstage" class="mt8"></div></div>`;
  const sb = $('#bpmnstage');
  const next = () => { stage++; run(); };

  function run() {
    sb.innerHTML = '';
    if (stage === 0) {
      const sel = new Set();
      sb.innerHTML = `<p class="small" style="font-weight:600">Шаг 1. Кто участвует в процессе? Выбери участников (дорожки):</p><div class="pool"></div>
        <button class="btn block mt8" id="bnext" disabled>Проверить участников</button><div class="res"></div>`;
      const pool = sb.querySelector('.pool');
      B.participants.opts.forEach((p, i) => {
        const c = el(`<button class="chip" type="button">${p}</button>`);
        c.onclick = () => { sel.has(i) ? sel.delete(i) : sel.add(i); c.classList.toggle('sel'); $('#bnext').disabled = !sel.size; };
        c.dataset.i = i; pool.appendChild(c);
      });
      $('#bnext').onclick = () => {
        const ok = B.participants.ok.every(i => sel.has(i)) && [...sel].every(i => B.participants.ok.includes(i));
        pool.querySelectorAll('.chip').forEach((c, i) => {
          if (B.participants.ok.includes(i)) c.classList.add(sel.has(i) ? 'ok' : 'err');
          else if (sel.has(i)) c.classList.add('err');
        });
        sb.querySelector('.res').innerHTML = `<div class="fb ${ok ? 'ok' : 'warn'}">${B.participants.why}</div>
          <button class="btn block mt8" id="bgo">Дальше</button>`;
        $('#bgo').onclick = next;
      };
    } else if (stage === 1) {
      sb.innerHTML = `<div id="bq"></div>`;
      renderChoice($('#bq'), Object.assign({}, B.start, { type: 'single', q: 'Шаг 2. ' + B.start.q }), () => {
        sb.insertAdjacentHTML('beforeend', `<button class="btn block mt8" id="bgo">Дальше</button>`);
        $('#bgo').onclick = next;
      });
    } else if (stage === 2) {
      sb.innerHTML = `<p class="small" style="font-weight:600">Шаг 3. Разложи задачи по дорожкам исполнителей. Нажми задачу, затем дорожку:</p>
        <div class="pool"></div><div class="cats"></div><button class="btn block mt8" id="bcheck" disabled>Проверить дорожки</button><div class="res"></div>`;
      const pool = sb.querySelector('.pool'), cats = sb.querySelector('.cats'), btn = $('#bcheck');
      const assign = {}; let picked = null;
      B.tasks.forEach((t, i) => {
        const c = el(`<button class="chip" type="button" data-i="${i}">${t.t}</button>`);
        c.onclick = () => { picked = i; pool.querySelectorAll('.chip').forEach(x => x.classList.remove('sel')); c.classList.add('sel'); };
        pool.appendChild(c);
      });
      B.lanes.forEach((ln, li) => {
        const bx = el(`<div class="card" style="padding:10px;margin:8px 0"><div class="tech">Дорожка: ${ln}</div><div class="slot"></div></div>`);
        bx.onclick = () => {
          if (picked === null) return;
          assign[picked] = li;
          const chip = pool.querySelector(`.chip[data-i="${picked}"]`);
          chip.classList.remove('sel'); bx.querySelector('.slot').appendChild(chip);
          picked = null; btn.disabled = Object.keys(assign).length < B.tasks.length;
        };
        cats.appendChild(bx);
      });
      btn.onclick = () => {
        btn.classList.add('hidden');
        let ok = 0;
        B.tasks.forEach((t, i) => {
          const chip = sb.querySelector(`.chip[data-i="${i}"]`);
          const r = assign[i] === t.lane;
          chip.classList.add(r ? 'ok' : 'err'); if (r) ok++;
          if (!r) chip.insertAdjacentHTML('afterend', `<div class="expl">«${t.t}» выполняет: <b>${B.lanes[t.lane]}</b></div>`);
        });
        const allOk = ok === B.tasks.length;
        if (allOk) grantAch('owner');
        sb.querySelector('.res').innerHTML = `<div class="fb ${allOk ? 'ok' : 'warn'}">${ok}/${B.tasks.length}. ${allOk ? 'Каждое действие получило владельца — процесс стал видимым.' : 'Вопрос-различитель: кто физически выполняет это действие?'}</div>
          <button class="btn block mt8" id="bgo">Дальше</button>`;
        $('#bgo').onclick = next;
      };
    } else if (stage === 3) {
      sb.innerHTML = `<div id="bq"></div>`;
      renderSort($('#bq'), Object.assign({}, B.order, { q: 'Шаг 4. ' + B.order.q }), () => {
        sb.insertAdjacentHTML('beforeend', `<button class="btn block mt8" id="bgo">Дальше</button>`);
        $('#bgo').onclick = next;
      });
    } else if (stage === 4) {
      sb.innerHTML = `<div id="bq"></div>`;
      renderChoice($('#bq'), Object.assign({}, B.gateway, { type: 'single', q: 'Шаг 5. ' + B.gateway.q }), () => {
        sb.insertAdjacentHTML('beforeend', `<button class="btn block mt8" id="bgo">Дальше</button>`);
        $('#bgo').onclick = next;
      });

function trainerBmc(box, lessonId) {
  let phase = 0;
  const assign = {};
  let picked = null;
  const pid = S.activeProject || 'case';
  if (!S.bmc[pid]) S.bmc[pid] = {};
  const my = S.bmc[pid];

  function drawGrid(target, contentFn, clickFn) {
    target.innerHTML = `<div class="bmc">${BMC_BLOCKS.map((b, i) =>
      `<div class="bmcblock ${i === 8 ? 'wide' : ''}" data-k="${b.k}" role="button" tabindex="0">
        <h4>${b.t}</h4><div class="items">${contentFn(b)}</div></div>`).join('')}</div>`;
    if (clickFn) target.querySelectorAll('.bmcblock').forEach(bl => {
      bl.onclick = () => clickFn(bl.dataset.k, bl);
      bl.onkeydown = e => { if (e.key === 'Enter') clickFn(bl.dataset.k, bl); };
    });
  }

  function run() {
    if (phase === 0) {
      box.innerHTML = `<div class="card"><div class="eyebrow">Business Model Canvas · кейс</div>
        <p class="small" style="font-weight:600">Разложи карточки сервиса диагностики по блокам. Нажми карточку, затем блок:</p>
        <div class="pool" id="bmcpool"></div><div id="bmcgrid"></div>
        <button class="btn block mt8" id="bmccheck" disabled>Проверить</button><div id="bmcres"></div></div>`;
      const pool = $('#bmcpool');
      BMC_CASE_CARDS.forEach((c, i) => {
        const chip = el(`<button class="chip" type="button" data-i="${i}">${c.t}</button>`);
        chip.onclick = () => { picked = i; pool.querySelectorAll('.chip').forEach(x => x.classList.remove('sel')); chip.classList.add('sel'); };
        pool.appendChild(chip);
      });
      drawGrid($('#bmcgrid'), b => (Object.keys(assign).filter(i => assign[i] === b.k).map(i => `<span>${BMC_CASE_CARDS[i].t}</span>`).join('')),
        (k) => {
          if (picked === null) return;
          assign[picked] = k;
          pool.querySelector(`.chip[data-i="${picked}"]`).classList.add('sel');
          picked = null;
          drawGridRefresh();
          $('#bmccheck').disabled = Object.keys(assign).length < BMC_CASE_CARDS.length;
        });
      function drawGridRefresh() {
        drawGrid($('#bmcgrid'), b => (Object.keys(assign).filter(i => assign[i] === b.k).map(i => `<span>${BMC_CASE_CARDS[i].t}</span>`).join('')),
          (k) => {
            if (picked === null) return;
            assign[picked] = k; picked = null; drawGridRefresh();
            $('#bmccheck').disabled = Object.keys(assign).length < BMC_CASE_CARDS.length;
          });
      }
      $('#bmccheck').onclick = () => {
        let ok = 0;
        const rows = BMC_CASE_CARDS.map((c, i) => {
          const r = assign[i] === c.k; if (r) ok++;
          const bt = BMC_BLOCKS.find(b => b.k === c.k).t;
          return `<div class="check"><span>${r ? '✓' : '✗'} <b>${c.t}</b> — ${bt}. <span class="dim">${c.why}</span></span></div>`;
        }).join('');
        $('#bmcres').innerHTML = `<div class="fb ${ok === 9 ? 'ok' : 'warn'}">${ok}/9 на местах.</div>
          <div class="card" style="padding:10px">${rows}</div>
          <button class="btn block mt8" id="bmcgo">Заполнить свой Canvas</button>`;
        $('#bmccheck').classList.add('hidden');
        $('#bmcgo').onclick = () => { phase = 1; run(); };
      };
    } else if (phase === 1) {
      box.innerHTML = `<div class="card"><div class="eyebrow">Business Model Canvas · мой проект</div>
        <p class="small dim">Нажми на блок и заполни его своими элементами (каждый с новой строки).</p>
        <div id="bmcgrid"></div>
        <button class="btn block mt8" id="bmcgo">К проверке согласованности</button></div>`;
      drawGrid($('#bmcgrid'), b => (my[b.k] || []).map(x => `<span>${esc(x)}</span>`).join('') || '<span class="dim" style="border:none;background:none">пусто</span>',
        (k) => {
          const b = BMC_BLOCKS.find(x => x.k === k);
          openModal(`<h3>${b.t}</h3>
            <div class="field"><textarea id="bmcedit" placeholder="Каждый элемент с новой строки">${esc((my[k] || []).join('\n'))}</textarea></div>
            <button class="btn block" id="bmcsave">Сохранить блок</button>`);
          $('#bmcsave').onclick = () => {
            my[k] = $('#bmcedit').value.split('\n').map(s => s.trim()).filter(Boolean);
            saveState(); closeModal(); phase = 1; run();
          };
        });
      $('#bmcgo').onclick = () => {
        const filled = BMC_BLOCKS.filter(b => (my[b.k] || []).length).length;
        if (filled < 5) { toast('Заполни хотя бы 5 блоков — иначе проверять нечего'); return; }
        phase = 2; run();
      };
    } else {
      box.innerHTML = `<div class="card"><div class="eyebrow">Проверка согласованности</div>
        <p class="small dim">Пройди по вопросам честно. «Нет» — это не провал, а найденная несостыковка: запиши её.</p>
        ${BMC_CONSISTENCY.map((q, i) => `<label class="check"><input type="checkbox" data-c="${i}"><span>${q}</span></label>`).join('')}
        <div class="field mt8"><label>Найденные несостыковки и что с ними делать</label>
        <textarea id="bmcnotes" placeholder="Например: доход привязан к разовой услуге, а активности — к контенту…"></textarea></div>
        <button class="btn block" id="bmcfin">Сохранить Canvas в паспорт</button></div>`;
      $('#bmcfin').onclick = () => {
        saveArtifact({ type: 'bmc', t: 'Business Model Canvas', passKey: 'bmc',
          data: BMC_BLOCKS.map(b => ({ label: b.t, val: (my[b.k] || []).join('; ') }))
            .concat([{ label: 'Несостыковки', val: $('#bmcnotes').value }]) });
        grantAch('canvas');
        addComp('model', 12);
        renderLessonStep(lessonId, 5);
      };
    }
  }
  run();
}

function trainerJtbd(box, lessonId) {
  const F = [
    { k: 'when', l: 'Когда я…', ph: 'ситуация: конкретный момент', min: 12 },
    { k: 'want', l: 'Я хочу…', ph: 'желаемый прогресс', min: 10 },
    { k: 'so', l: 'Чтобы…', ph: 'результат в жизни', min: 10 },
    { k: 'func', l: 'Функциональная сторона', ph: 'что должно быть сделано физически', min: 10 },
    { k: 'emo', l: 'Эмоциональная сторона', ph: 'что хочет чувствовать / перестать чувствовать', min: 10 },
    { k: 'soc', l: 'Социальная сторона', ph: 'как хочет выглядеть в глазах других', min: 8 },
    { k: 'alt', l: 'Существующие альтернативы', ph: 'кого «нанимают» сейчас, включая «ничего не делать»', min: 15 },
    { k: 'bar', l: 'Препятствия переключения', ph: 'что мешает нанять новое решение', min: 10 }
  ];
  box.innerHTML = `<div class="card"><div class="eyebrow">Конструктор JTBD</div>
    <p class="small dim">Собери работу своего клиента. Красивая фраза — не результат: результат — работа, подтверждаемая контекстом.</p>
    ${F.map(f => `<div class="field"><label>${f.l}</label><textarea id="jt-${f.k}" placeholder="${esc(f.ph)}" style="min-height:56px"></textarea></div>`).join('')}
    <button class="btn block" id="jtcheck">Проверить и сохранить</button><div id="jtres"></div></div>`;
  $('#jtcheck').onclick = () => {
    const vals = {}; F.forEach(f => vals[f.k] = $('#jt-' + f.k).value.trim());
    const miss = [];
    F.forEach(f => { if (vals[f.k].length < f.min) miss.push(`«${f.l}» — пусто или слишком общо.`); });
    if (/всегда|постоянно/i.test(vals.when)) miss.push('Ситуация «всегда» — не ситуация. Найди конкретный момент включения работы.');
    if (vals.alt && !/ничего|не делать|оставить как есть|вручную|сам/i.test(vals.alt)) miss.push('В альтернативах не видно «ничего не менять» или текущего ручного способа — а это главный конкурент.');
    if (miss.length) {
      $('#jtres').innerHTML = `<div class="fb warn"><b>Работа пока не собрана:</b><ul>${miss.map(m => `<li>${m}</li>`).join('')}</ul>
        <div class="mt8 small">Вопрос для проверки: можешь ли ты назвать реального человека, у которого эта работа «включалась» за последний месяц?</div></div>`;
    } else {
      $('#jtres').innerHTML = `<div class="fb ok"><b>Формула собрана:</b> «Когда я ${esc(vals.when)}, я хочу ${esc(vals.want)}, чтобы ${esc(vals.so)}».
        <div class="mt8 small">Следующий шаг честности — подтвердить её интервью (урок 2.3), а не влюбиться в формулировку.</div></div>
        <button class="btn block mt8" id="jtfin">Сохранить в паспорт</button>`;
      $('#jtfin').onclick = () => {
        saveArtifact({ type: 'jtbd', t: 'JTBD клиента', passKey: 'jtbd', data: F.map(f => ({ label: f.l, val: vals[f.k] })) });
        addComp('research', 12);
        renderLessonStep(lessonId, 5);
      };
    }
  };
}

/* ============================================================
   Тренажёр Mom Test
   ============================================================ */
function trainerMomtest(box, lessonId) {
  let qi = 0, score = 0;
  box.innerHTML = `<div class="card"><div class="eyebrow">Тренажёр интервью</div><div id="mtq"></div></div>`;
  const qbox = $('#mtq');
  function ask() {
    if (qi >= MOMTEST_QUESTIONS.length) { rewrite(); return; }
    const Q = MOMTEST_QUESTIONS[qi];
    qbox.innerHTML = `<div class="tech">Вопрос ${qi + 1}/${MOMTEST_QUESTIONS.length}</div>
      <p class="small mt8" style="font-weight:600">«${Q.q}»</p><p class="small dim">Какой это вопрос?</p><div class="pool"></div><div class="res"></div>`;
    const pool = qbox.querySelector('.pool');
    MOMTEST_TYPES.forEach((t, i) => {
      const c = el(`<button class="chip" type="button">${t}</button>`);
      c.onclick = () => {
        if (qbox.dataset.done) return;
        qbox.dataset.done = 1;
        const right = i === Q.a;
        if (right) score++;
        c.classList.add(right ? 'ok' : 'err');
        if (!right) pool.children[Q.a].classList.add('ok');
        qbox.querySelector('.res').innerHTML = `<div class="fb ${right ? 'ok' : 'warn'}"><b>${MOMTEST_TYPES[Q.a]}.</b> ${Q.why}</div>
          <button class="btn block mt8" id="mtnext">Дальше</button>`;
        $('#mtnext').onclick = () => { delete qbox.dataset.done; qi++; ask(); };
      };
      pool.appendChild(c);
    });
  }
  function rewrite() {
    qbox.innerHTML = `<div class="fb ${score >= 7 ? 'ok' : 'warn'}">Классификация: ${score}/${MOMTEST_QUESTIONS.length}.</div>
      <div class="eyebrow mt8">Редактор вопроса</div>
      <p class="small">Плохой вопрос: <b>«${MOMTEST_REWRITE.bad}»</b></p>
      <p class="small dim">Перепиши его так, чтобы он добывал факты о прошлом поведении:</p>
      <div class="field"><textarea id="mtrw" placeholder="Твоя версия вопроса…"></textarea></div>
      <button class="btn block" id="mtrwcheck">Проверить вопрос</button><div class="res"></div>`;
    $('#mtrwcheck').onclick = () => {
      const v = $('#mtrw').value.trim();
      const problems = [];
      if (v.length < 15) problems.push('Вопрос слишком короткий.');
      MOMTEST_REWRITE.banned.forEach(b => { if (b.re.test(v)) problems.push(b.msg); });
      const hasGood = MOMTEST_REWRITE.good.some(g => v.toLowerCase().includes(g));
      if (!hasGood) problems.push('Не видно обращения к прошлому опыту («расскажите про последний раз…», «что вы делали, когда…»).');
      const res = qbox.querySelector('.res');
      if (problems.length) {
        res.innerHTML = `<div class="fb warn"><b>Вопрос пока продаёт, а не исследует:</b><ul>${problems.map(p => `<li>${p}</li>`).join('')}</ul>
          <div class="mt8 small"><b>Хороший вопрос:</b><ul>${MOMTEST_REWRITE.tips.map(t => `<li>${t}</li>`).join('')}</ul></div></div>`;
      } else {
        res.innerHTML = `<div class="fb ok"><b>Вопрос стал исследовательским.</b> Он спрашивает о реальном прошлом и не упоминает твою идею — теперь ответ будет что-то значить.</div>
          <button class="btn block mt8" id="mtfin">Сохранить и продолжить</button>`;
        $('#mtfin').onclick = () => {
          saveArtifact({ type: 'interview', t: 'Вопросы интервью (Mom Test)', passKey: 'client',
            data: [{ label: 'Классификация', val: score + '/' + MOMTEST_QUESTIONS.length }, { label: 'Мой вопрос', val: v }] });
          addComp('research', 12);
          renderLessonStep(lessonId, 5);
        };
      }
    };
  }
  ask();
}

function exportPassport(pid) {
  let md = `# Архитектурный паспорт: ${projName(pid)}\n\n_Сформирован в TORIYA ARCHITECTURE LAB, ${new Date().toLocaleDateString('ru-RU')}_\n\n`;
  const p = S.projects.find(x => x.id === pid);
  if (p) md += PROJ_FIELDS.map(f => p[f.k] ? `**${f.l}:** ${p[f.k]}` : '').filter(Boolean).join('\n') + '\n\n';
  passportData(pid).forEach(({ sec, arts }) => {
    md += `## ${sec.t}\n`;
    if (!arts.length) md += sec.lv > 4 ? `_Следующая часть архитектуры (уровень ${sec.lv})._\n\n` : `_Пока не заполнено._\n\n`;
    else arts.forEach(a => {
      md += `### ${a.t}\n`;
      a.data.forEach(d => { if (d.val) md += `- **${d.label}:** ${d.val}\n`; });
      md += '\n';
    });
  });
  openModal(`<h3>Экспорт паспорта</h3><p class="small dim mt8">Скопируй Markdown или сохрани файлом.</p>
    <pre class="export">${esc(md)}</pre>
    <div class="btnrow"><button class="btn subtle grow" id="expcopy">Копировать</button>
    <button class="btn grow" id="expdl">Скачать .md</button></div>`);
  $('#expcopy').onclick = () => copyText(md);
  $('#expdl').onclick = () => downloadFile('architecture-passport.md', md, 'text/markdown');
}
function downloadFile(name, content, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type: mime }));
  a.download = name; a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 2000);
}

function levelProgress(lv) {
  if (!lv.lessons.length) return 0;
  const d = lv.lessons.filter(id => S.lessons[id] && S.lessons[id].done).length;
  return Math.round(d / lv.lessons.length * 100);
}
function currentLevel() {
  for (const lv of LEVELS) if (lv.full && levelProgress(lv) < 100) return lv;
  return LEVELS[5];
}

  showDetail(`<button class="backbtn" onclick="showTab('cases')">← Кейсы</button>

    <div id="casesteps"></div>`, 'cases');

  function step() {
    if (si >= total) { debrief(); return; }
    const st = c.steps[si];
    const d = el(`<div class="card"></div>`);
    sb.appendChild(d);
    renderChoice(d, { type: st.multi ? 'multi' : 'single', multi: st.multi, q: st.q, opts: st.opts }, right => {
      if (right) ok++;
      d.insertAdjacentHTML('beforeend', `<button class="btn block mt8">Дальше</button>`);
      d.querySelector('button.btn.block:last-child').onclick = e => { e.target.remove(); si++; step(); };
    });
    d.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  function debrief() {
    const first = !S.casesDone[c.id];
    S.casesDone[c.id] = { ok, total, ts: Date.now() };
    if (first) {
      addComp(c.comp, 8); addComp('sys', 3);
      if (ok === total && c.ach) grantAch(c.ach);
    }
    saveState();
    sb.insertAdjacentHTML('beforeend', `<div class="card frame">
      <div class="eyebrow">Архитектурный разбор</div>
      <div class="small mt8"><b>Факты:</b> ${c.debrief.fact}</div>

    sb.lastElementChild.scrollIntoView({ behavior: 'smooth' });
  }
  step();
}

/* ============================================================
   Стартовая диагностика мышления
   ============================================================ */
function openDiagnostic() {
  let qi = 0;
  const dims = {};
  showDetail(`<button class="backbtn" onclick="showTab('lab')">← Лаборатория</button>
    <div class="eyebrow">Диагностика мышления</div><h2>12 ситуаций</h2>
    <p class="sub">Не тест на оценку — снимок того, как ты сейчас думаешь о системах.</p>
    <div id="diagbox"></div>`, 'lab');
  const box = $('#diagbox');
  function ask() {
    if (qi >= DIAGNOSTIC.length) { profile(); return; }
    const Q = DIAGNOSTIC[qi];
    box.innerHTML = `<div class="card"><div class="tech">Ситуация ${qi + 1}/12 · ${DIAG_DIMS[Q.dim]}</div><div id="dq" class="mt8"></div></div>`;
    renderChoice($('#dq'), { type: 'single', q: Q.q, opts: Q.opts.map(o => ({ t: o.t, ok: o.ok, why: o.ok ? Q.why : null })) }, right => {
      if (!dims[Q.dim]) dims[Q.dim] = { ok: 0, n: 0 };
      dims[Q.dim].n++; if (right) dims[Q.dim].ok++;
      box.insertAdjacentHTML('beforeend', `<button class="btn block" id="dgo">Дальше</button>`);
      $('#dgo').onclick = () => { qi++; ask(); };
    });
  }
  function profile() {
    const strong = [], grow = [];
    let worst = null;
    Object.keys(dims).forEach(d => {
      const r = dims[d].ok / dims[d].n;
      if (r >= 0.99) strong.push(DIAG_DIMS[d]);
      else { grow.push(DIAG_DIMS[d]); if (!worst || r < dims[worst].ok / dims[worst].n) worst = d; }
    });
    const recLevel = worst === 'mt' ? 2 : worst === 'lv' ? 1 : 0;
    const errText = {
      sc: 'лечить симптом, не проверив причину', ft: 'выбирать инструмент раньше задачи',
      bd: 'начинать без границы системы', dt: 'принимать решения при отсутствующих данных',
      mt: 'строить решение до исследования', lv: 'искать проблему не на том уровне системы'
    };
    S.diag = { dims, ts: Date.now() };
    saveState();
    box.innerHTML = `<div class="card frame">
      <div class="eyebrow">Профиль мышления</div>
      ${strong.length ? `<div class="small mt8"><b>Сильные стороны:</b> ${strong.join('; ')}</div>` : ''}
      ${grow.length ? `<div class="small mt8"><b>Зоны развития:</b> ${grow.join('; ')}</div>` : `<div class="small mt8"><b>Все шесть различений на месте.</b> Дальше их укрепит практика на собственном проекте.</div>`}
      ${worst ? `<div class="small mt8"><b>Наиболее частая ошибка мышления:</b> ${errText[worst]}.</div>` : ''}
      <div class="small mt8"><b>Рекомендуемый первый модуль:</b> Уровень ${recLevel} · ${LEVELS[recLevel].t}</div>
      <button class="btn block mt8" onclick="openLevel(${recLevel})">Начать с уровня ${recLevel}</button></div>`;
  }
  ask();
}

/* ============================================================
   14. IMPORT / EXPORT
   ============================================================ */
function exportAll() {
  const json = JSON.stringify(S, null, 2);
  openModal(`<h3>Экспорт данных</h3><p class="small dim mt8">Полное состояние лаборатории: проекты, прогресс, артефакты.</p>
    <div class="btnrow"><button class="btn subtle grow" id="jcopy">Копировать</button>
    <button class="btn grow" id="jdl">Скачать .json</button></div>`);
  $('#jcopy').onclick = () => copyText(json);
  $('#jdl').onclick = () => downloadFile('toriya-architecture-lab.json', json, 'application/json');
}
function importAll() {
  openModal(`<h3>Импорт данных</h3><p class="small dim mt8">Вставь содержимое ранее экспортированного JSON. Текущее состояние будет заменено.</p>
    <div class="field"><textarea id="jimp" placeholder='{"v":1, …}'></textarea></div>
    <button class="btn block" id="jgo">Импортировать</button><div id="jerr"></div>`);
  $('#jgo').onclick = () => {
    try {
      const data = JSON.parse($('#jimp').value);
      if (!data || typeof data !== 'object' || typeof data.v !== 'number') throw new Error('bad');
      S = migrate(data); saveState(); closeModal(); toast('Импорт выполнен'); showTab('lab');
    } catch (e) {
      $('#jerr').innerHTML = `<div class="fb err mt8">Не удалось импортировать: файл повреждён или это не экспорт лаборатории. Проверь, что вставлен весь JSON целиком.</div>`;
    }
  };
}
function confirmReset() {
  confirmModal('Полный сброс', 'Будут удалены все проекты, прогресс, артефакты и достижения. Это действие необратимо. Сначала можно сделать экспорт.', 'Стереть всё', resetAll);
}

/* ============================================================
   15. INITIALIZATION + boot
   ============================================================ */
const BOOT_LINES = ['— Загружаем бизнес-контекст', '— Активируем системное мышление', '— Подключаем карту методов', '— Создаём рабочую область', '— Лаборатория готова'];

function runBoot() {
  const lines = $('#bootlines');
  BOOT_LINES.forEach((l, i) => {
    setTimeout(() => { lines.insertAdjacentHTML('beforeend', `<div>${l}</div>`); }, 350 + i * 420);
  });
  setTimeout(() => {
    $('#boot').classList.add('hide');
    if (S.firstRun) firstRunChoice();
    else showTab('lab');
  }, 350 + BOOT_LINES.length * 420 + 500);
}

function firstRunChoice() {
  S.firstRun = false; S.activeProject = 'case'; saveState();
  showTab('lab');
  openModal(`<div class="eyebrow">С чего начнём?</div>
    <h3>Три входа в лабораторию</h3>
    <button class="opt mt8" id="fr1"><span><b>Начать с учебного кейса</b><br><span class="small dim">Сервис архитектурной диагностики — сквозной проект программы</span></span></button>
    <button class="opt" id="fr2"><span><b>Создать свой проект</b><br><span class="small dim">Задания уроков будут применяться к твоему бизнесу</span></span></button>
    <button class="opt" id="fr3"><span><b>Пройти диагностику мышления</b><br><span class="small dim">12 ситуаций · профиль и рекомендуемый старт</span></span></button>`);
  $('#fr1').onclick = () => { closeModal(); openMainCase(); };
  $('#fr2').onclick = () => { closeModal(); editProject(null); };
  $('#fr3').onclick = () => { closeModal(); openDiagnostic(); };
}

  try {
    const u = new SpeechSynthesisUtterance(dayQuestion());
    u.lang = 'ru-RU'; speechSynthesis.cancel(); speechSynthesis.speak(u);

Object.assign(window, { speakDayQ, showTab, openLevel, openLesson, openCase, openMainCase, openDiagnostic,

  openSources, exportAll, importAll, confirmReset, closeModal });

document.addEventListener('DOMContentLoaded', () => {
  loadState();
  runBoot();
});
